---
name: build
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    timeout-minutes: 15
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: redhat-actions/buildah-build@v2.13
        with:
          containerfiles: ./client/Containerfile
          image: pulse-client
          tags: latest
      - uses: redhat-actions/buildah-build@v2.13
        with:
          containerfiles: ./server/Containerfile
          image: pulse-server
          tags: latest
