---
name: build
'on':
  pull_request:
    paths: &paths
      - client/**
      - server/**
  push:
    branches: [master]
    paths: *paths
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: sh
jobs:
  build:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: redhat-actions/buildah-build@v2.13
        with:
          containerfiles: ./client/Containerfile
          image: pulse-client
          tags: latest
      - uses: redhat-actions/buildah-build@v2.13
        with:
          containerfiles: ./server/Containerfile
          image: pulse-server
          tags: latest
