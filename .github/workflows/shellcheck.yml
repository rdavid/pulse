---
name: shellcheck
'on':
  pull_request:
    paths: &paths
      - '*.do'
      - client/client
      - server/server
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  shellcheck:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          additional_files: >
            ./*.do
            ./client/client
            ./server/server
