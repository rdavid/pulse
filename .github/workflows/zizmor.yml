---
name: zizmor
'on':
  pull_request:
    paths: &paths
      - .github/**
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  zizmor:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - env:
          GH_TOKEN: ${{ github.token }}
        run: pipx run zizmor==1.26.1 .
