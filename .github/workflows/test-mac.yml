# Runs lint tests only because macOS cannot run containers natively.
---
name: test-mac
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test-mac:
    timeout-minutes: 15
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15-intel
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: |
          rel=0.9.20260404
          srv=https://github.com/rdavid/shellbase/archive/refs/tags
          brew install goredo
          curl --location --silent "$srv/v$rel.tar.gz" |
            tar \
              --directory /usr/local/bin \
              --extract \
              --gzip \
              --strip-components=2 \
              shellbase-"$rel"/lib/base.sh
          redo -xx lint
