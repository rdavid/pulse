---
name: actionlint
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  actionlint:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3
      - id: get
        run: |
          ver=1.7.12
          srv=https://raw.githubusercontent.com/rhysd/actionlint
          srv="$srv/v$ver/scripts/download-actionlint.bash"
          bash <(curl --silent "$srv") "$ver"
      - run: ${{ steps.get.outputs.executable }}
