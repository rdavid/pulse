---
name: yamllint
'on':
  pull_request:
    paths: &paths
      - '**.yml'
      - '**.yaml'
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  yamllint:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: ibiqlik/action-yamllint@v3.1.1
        with:
          file_or_dir: >
            ./.github/*.yml
            ./.github/workflows/*.yml
            ./*.yml
          strict: true
